<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #F1F5F9;
    }
    .counter-container {
      text-align: center; background: white; padding: 40px 60px;
      border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.5rem; color: #334155; margin-bottom: 20px; }
    #count-display {
      font-size: 5rem; font-weight: 800; color: #1E293B;
      margin: 20px 0; transition: color 0.3s;
    }
    .buttons { display: flex; gap: 12px; justify-content: center; }
    button {
      padding: 12px 28px; font-size: 1.1rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.95); }
    #decrease { background: #FEE2E2; color: #DC2626; }
    #reset    { background: #F1F5F9; color: #64748B; }
    #increase { background: #DCFCE7; color: #16A34A; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="counter-container">
    <h1>Counter App</h1>
    <div id="count-display">0</div>
    <div class="buttons">
      <button id="decrease">− Decrease</button>
      <button id="reset">Reset</button>
      <button id="increase">+ Increase</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
